<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<title>Golden Circle — Simon Sinek</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: {{PRIMARY}};
    --secondary: {{SECONDARY}};
    --accent: {{ACCENT}};
    --neutral: {{NEUTRAL}};
    --background: {{BACKGROUND}};
    --text: {{TEXT}};
    --font: {{FONT_FAMILY}};
    --shadow: {{SHADOW}};
    --radius: {{BORDER_RADIUS}};
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px;
    background: var(--background);
    font-family: var(--font), 'Inter', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    padding: 28px 64px 8px;
    text-align: center;
  }
  .header .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--neutral);
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--primary);
  }

  /* ── Main Layout ── */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    padding: 0 64px 32px;
  }

  /* ── Concentric Circles ── */
  .circles {
    position: relative;
    width: 580px;
    height: 580px;
    flex-shrink: 0;
  }

  .circle {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* Outer: WHAT */
  .c-what {
    width: 580px; height: 580px;
    top: 0; left: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.02) 100%);
    border: 3px solid var(--neutral);
    box-shadow: var(--shadow);
  }

  /* Middle: HOW */
  .c-how {
    width: 380px; height: 380px;
    top: 100px; left: 100px;
    background: linear-gradient(135deg, rgba(0,0,0,0.03) 0%, transparent 100%);
    border: 3px solid var(--secondary);
    box-shadow: var(--shadow);
  }

  /* Inner: WHY */
  .c-why {
    width: 190px; height: 190px;
    top: 195px; left: 195px;
    background: var(--primary);
    border: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18), var(--shadow);
    z-index: 3;
  }

  /* Circle labels */
  .c-label {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .c-why .c-label {
    font-size: 28px;
    color: #fff;
  }
  .c-how .c-label {
    font-size: 22px;
    color: var(--secondary);
    position: absolute;
    top: 28px;
  }
  .c-what .c-label {
    font-size: 20px;
    color: var(--neutral);
    position: absolute;
    top: 24px;
  }

  /* ── Description Cards (right side) ── */
  .descriptions {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 480px;
  }

  .desc-card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 24px 28px;
    position: relative;
    overflow: hidden;
  }
  .desc-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 5px;
  }
  .desc-card .d-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .desc-card .d-badge {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .desc-card .d-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .desc-card .d-content {
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    opacity: 0.85;
    padding-left: 48px;
  }

  /* WHY card */
  .dc-why::before { background: var(--primary); }
  .dc-why .d-badge { background: var(--primary); }
  .dc-why .d-title { color: var(--primary); }

  /* HOW card */
  .dc-how::before { background: var(--secondary); }
  .dc-how .d-badge { background: var(--secondary); }
  .dc-how .d-title { color: var(--secondary); }

  /* WHAT card */
  .dc-what::before { background: var(--neutral); }
  .dc-what .d-badge { background: var(--neutral); }
  .dc-what .d-title { color: var(--neutral); }
</style>
</head>
<body>

  <div class="header">
    <div class="label">The Golden Circle</div>
    <h1>{{SO_WHAT}}</h1>
  </div>

  <div class="main">
    <!-- Concentric Circles -->
    <div class="circles">
      <div class="circle c-what">
        <div class="c-label">What</div>
      </div>
      <div class="circle c-how">
        <div class="c-label">How</div>
      </div>
      <div class="circle c-why">
        <div class="c-label">Why</div>
      </div>
    </div>

    <!-- Description Cards -->
    <div class="descriptions">
      <div class="desc-card dc-why">
        <div class="d-header">
          <div class="d-badge">WHY</div>
          <div class="d-title">Purpose & Belief</div>
        </div>
        <div class="d-content">{{WHY}}</div>
      </div>

      <div class="desc-card dc-how">
        <div class="d-header">
          <div class="d-badge">HOW</div>
          <div class="d-title">Process & Approach</div>
        </div>
        <div class="d-content">{{HOW}}</div>
      </div>

      <div class="desc-card dc-what">
        <div class="d-header">
          <div class="d-badge">WHAT</div>
          <div class="d-title">Products & Results</div>
        </div>
        <div class="d-content">{{WHAT}}</div>
      </div>
    </div>
  </div>

</body>
</html>
