<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1600">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Ishikawa Fishbone Diagram</title>
<style>
  :root {
    --primary: {{PRIMARY}};
    --secondary: {{SECONDARY}};
    --accent: {{ACCENT}};
    --neutral: {{NEUTRAL}};
    --background: {{BACKGROUND}};
    --text: {{TEXT}};
    --font: {{FONT_FAMILY}};
    --shadow: {{SHADOW}};
    --radius: {{BORDER_RADIUS}};
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px; height: 900px;
    font-family: var(--font), 'Inter', sans-serif;
    background: var(--background);
    color: var(--text);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .so-what {
    text-align: center;
    padding: 24px 48px 10px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--primary);
    line-height: 1.3;
  }
  .container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px 24px;
    position: relative;
  }
  .fishbone {
    position: relative;
    width: 1440px;
    height: 720px;
  }
  /* Main spine */
  .spine {
    position: absolute;
    top: 50%;
    left: 80px;
    right: 160px;
    height: 4px;
    background: var(--primary);
    transform: translateY(-50%);
    z-index: 2;
  }
  .spine::after {
    content: '';
    position: absolute;
    right: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-left: 18px solid var(--primary);
  }
  /* Effect head */
  .effect {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    background: var(--primary);
    color: #fff;
    padding: 20px 22px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    text-align: center;
    z-index: 3;
  }
  .effect-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .effect-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  /* Cause branches */
  .branch {
    position: absolute;
    z-index: 1;
  }
  /* Diagonal bone lines via pseudo-elements */
  .branch-line {
    position: absolute;
    width: 3px;
    background: var(--neutral);
    opacity: 0.5;
    transform-origin: bottom center;
    z-index: 0;
  }
  /* Cause category card */
  .cause-card {
    position: absolute;
    width: 240px;
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 18px 12px;
    z-index: 4;
  }
  .cause-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid;
  }
  .sub-causes {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .sub-cause {
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    padding: 5px 8px;
    border-radius: calc(var(--radius) * 0.4);
    background: rgba(0,0,0,0.03);
    border-left: 2px solid;
  }
  /* Color coding for 4 branches */
  .cause-1 .cause-title { color: #1565c0; border-bottom-color: #1565c0; }
  .cause-1 .sub-cause { border-left-color: #1565c0; }
  .cause-2 .cause-title { color: #2e7d32; border-bottom-color: #2e7d32; }
  .cause-2 .sub-cause { border-left-color: #2e7d32; }
  .cause-3 .cause-title { color: #e65100; border-bottom-color: #e65100; }
  .cause-3 .sub-cause { border-left-color: #e65100; }
  .cause-4 .cause-title { color: #6a1b9a; border-bottom-color: #6a1b9a; }
  .cause-4 .sub-cause { border-left-color: #6a1b9a; }
  /* Branch positions — 2 above, 2 below */
  /* Branch 1: top-left */
  .branch-1 {
    left: 180px; top: 50%;
  }
  .branch-1 .cause-card {
    bottom: 40px; left: -80px;
  }
  .branch-1 .branch-line {
    height: 180px;
    bottom: 0; left: 50%;
    transform: rotate(30deg);
    transform-origin: bottom center;
    background: #1565c0; opacity: 0.3;
  }
  /* Branch 2: top-right */
  .branch-2 {
    left: 620px; top: 50%;
  }
  .branch-2 .cause-card {
    bottom: 40px; left: -80px;
  }
  .branch-2 .branch-line {
    height: 180px;
    bottom: 0; left: 50%;
    transform: rotate(-30deg);
    transform-origin: bottom center;
    background: #2e7d32; opacity: 0.3;
  }
  /* Branch 3: bottom-left */
  .branch-3 {
    left: 180px; top: 50%;
  }
  .branch-3 .cause-card {
    top: 40px; left: -80px;
  }
  .branch-3 .branch-line {
    height: 180px;
    top: 0; left: 50%;
    transform: rotate(-30deg);
    transform-origin: top center;
    background: #e65100; opacity: 0.3;
  }
  /* Branch 4: bottom-right */
  .branch-4 {
    left: 620px; top: 50%;
  }
  .branch-4 .cause-card {
    top: 40px; left: -80px;
  }
  .branch-4 .branch-line {
    height: 180px;
    top: 0; left: 50%;
    transform: rotate(30deg);
    transform-origin: top center;
    background: #6a1b9a; opacity: 0.3;
  }
  /* Junction dots on spine */
  .junction {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--primary);
    z-index: 3;
  }
  .junction-1 { left: 260px; }
  .junction-2 { left: 700px; }
</style>
</head>
<body>
  <div class="so-what">{{SO_WHAT}}</div>
  <div class="container">
    <div class="fishbone">
      <!-- Spine -->
      <div class="spine"></div>
      <!-- Junction dots -->
      <div class="junction junction-1"></div>
      <div class="junction junction-2"></div>
      <!-- Effect head -->
      <div class="effect">
        <div class="effect-label">Effect</div>
        <div class="effect-text">{{EFFECT}}</div>
      </div>
      <!-- Branch 1: top-left -->
      <div class="branch branch-1">
        <div class="branch-line"></div>
        <div class="cause-card cause-1">
          <div class="cause-title">{{CAUSE_1}}</div>
          <div class="sub-causes">
            <div class="sub-cause">{{CAUSE_1_A}}</div>
            <div class="sub-cause">{{CAUSE_1_B}}</div>
          </div>
        </div>
      </div>
      <!-- Branch 2: top-right -->
      <div class="branch branch-2">
        <div class="branch-line"></div>
        <div class="cause-card cause-2">
          <div class="cause-title">{{CAUSE_2}}</div>
          <div class="sub-causes">
            <div class="sub-cause">{{CAUSE_2_A}}</div>
            <div class="sub-cause">{{CAUSE_2_B}}</div>
          </div>
        </div>
      </div>
      <!-- Branch 3: bottom-left -->
      <div class="branch branch-3">
        <div class="branch-line"></div>
        <div class="cause-card cause-3">
          <div class="cause-title">{{CAUSE_3}}</div>
          <div class="sub-causes">
            <div class="sub-cause">{{CAUSE_3_A}}</div>
            <div class="sub-cause">{{CAUSE_3_B}}</div>
          </div>
        </div>
      </div>
      <!-- Branch 4: bottom-right -->
      <div class="branch branch-4">
        <div class="branch-line"></div>
        <div class="cause-card cause-4">
          <div class="cause-title">{{CAUSE_4}}</div>
          <div class="sub-causes">
            <div class="sub-cause">{{CAUSE_4_A}}</div>
            <div class="sub-cause">{{CAUSE_4_B}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
